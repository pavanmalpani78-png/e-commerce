<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    {% include "navbar.html" %}

    <div class="container mt-4" style="max-width:900px;">
        <div class="card p-4">
            <h4 class="fw-bold mb-3">✏️ Edit Order</h4>

            <form method="POST">
                {% csrf_token %}

                <div class="row g-3">

                    <div class="col-md-4">
                        <label class="form-label">Customer</label>
                        <select name="customer" class="form-select" required>
                            {% for c in customers %}
                            <option value="{{ c.id }}" {% if order.customer_id==c.id %}selected{% endif %}>{{ c.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Order Date</label>
                        <input type="date" name="date" class="form-control" value="{{ order.date|date:'Y-m-d' }}"
                            required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Product</label>
                        <select name="product_type" class="form-select" required>
                            <option value="MILK" {% if order.product_type=="MILK" %}selected{% endif %}>Milk</option>
                            <option value="GHEE" {% if order.product_type=="GHEE" %}selected{% endif %}>Ghee</option>
                            <option value="PANEER" {% if order.product_type=="PANEER" %}selected{% endif %}>Paneer
                            </option>
                            <option value="CURD" {% if order.product_type=="CURD" %}selected{% endif %}>Curd</option>
                            <option value="BUTTER" {% if order.product_type=="BUTTER" %}selected{% endif %}>Butter
                            </option>
                        </select>
                    </div>

                    <div class="col-12">
                        <div class="alert alert-info mb-0">
                            Edit fields and click <b>Update</b>. Totals will auto-calculate in model save().
                        </div>
                    </div>

                    <div class="col-12 d-flex gap-2 mt-2">
                        <button class="btn btn-success">Update</button>
                        <a class="btn btn-secondary"
                            href="{% url 'milk_order' %}?date={{ order.date|date:'Y-m-d' }}">Back</a>
                    </div>

                </div>
            </form>
        </div>
    </div>

</body>

</html>
