<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Place Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .wrap {
            max-width: 980px;
            margin: 28px auto;
        }

        .cardx {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(20, 40, 80, .08);
            overflow: hidden;
        }

        .topbar {
            background: linear-gradient(135deg, #0d6efd, #2193b0);
            color: #fff;
            padding: 22px 24px;
        }

        .btn-pill {
            border-radius: 12px;
            padding: 10px 14px;
            font-weight: 600;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card cardx">
            <div class="topbar d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="m-0 fw-bold">Place Dairy Order</h3>
                    <div class="opacity-75">Your order will be pending until shopkeeper approves</div>
                </div>
                <a class="btn btn-light btn-pill" href="{% url 'customer_dashboard' %}">Back</a>
            </div>

            <div class="p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Product</label>
                            <select class="form-select" name="product_type" id="product_type" required>
                                <option value="MILK">Milk</option>
                                <option value="GHEE">Ghee</option>
                                <option value="PANEER">Paneer</option>
                                <option value="CURD">Curd</option>
                                <option value="BUTTER">Butter</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Quantity</label>
                            <input class="form-control" name="quantity" type="number" step="0.1" value="1" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Unit</label>
                            <select class="form-select" name="unit" required>
                                <option value="L">L (Liter)</option>
                                <option value="KG">KG</option>
                                <option value="PCS">PCS</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Rate</label>
                            <input class="form-control" name="rate" type="number" step="0.1" value="0" required>
                        </div>

                        <!-- Optional milk fields -->
                        <div class="col-md-4">
                            <label class="form-label">Milk Brand (optional)</label>
                            <select class="form-select" name="brand">
                                <option value="">-- None --</option>
                                <option value="AMUL">Amul</option>
                                <option value="VIKAS">Vikas</option>
                                <option value="SARASWATI">Saraswati</option>
                                <option value="AMAR">Amar</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Milk Type (optional)</label>
                            <select class="form-select" name="milk_type">
                                <option value="">-- None --</option>
                                <option value="COW">Cow</option>
                                <option value="BUFFALO">Buffalo</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Pack Size (optional)</label>
                            <select class="form-select" name="pack_size">
                                <option value="">-- None --</option>
                                <option value="0.5">0.5 L</option>
                                <option value="1.0">1 L</option>
                                <option value="2.0">2 L</option>
                                <option value="5.0">5 L</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Packets (optional)</label>
                            <input class="form-control" name="packets" type="number" min="0" value="0">
                        </div>

                        <div class="col-12">
                            <button class="btn btn-success btn-pill w-100">Submit Order</button>
                        </div>
                    </div>
                </form>

                <div class="text-muted small mt-3">
                    Note: For non-milk items, just use Quantity + Unit + Rate.
                </div>
            </div>
        </div>
    </div>
</body>

</html>
