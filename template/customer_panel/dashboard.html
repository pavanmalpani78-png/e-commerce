<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Digital Dairy | Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .wrap {
            max-width: 1150px;
            margin: 0 auto;
            padding: 28px 16px 40px;
        }

        /* top nav */
        .navx {
            background: #fff;
            border: 1px solid #eef2ff;
            border-radius: 18px;
            padding: 14px 18px;
            box-shadow: 0 10px 24px rgba(20, 40, 80, .06);
            margin-bottom: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mark {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, #0d6efd, #2193b0);
        }

        .muted {
            color: #6b7280;
        }

        .btn-pill {
            border-radius: 14px;
            padding: 12px 16px;
            font-weight: 700;
        }

        /* main card */
        .cardx {
            background: #fff;
            border: 1px solid #eef2ff;
            border-radius: 22px;
            box-shadow: 0 14px 30px rgba(20, 40, 80, .07);
            overflow: hidden;
        }

        .topbar {
            background: linear-gradient(135deg, #0d6efd, #2193b0);
            color: #fff;
            padding: 24px 26px;
        }

        .topbar h3 {
            margin: 0;
            font-weight: 900;
        }

        /* KPI */
        .kpi {
            background: #ffffff;
            border: 1px solid #eef2ff;
            border-radius: 18px;
            padding: 18px;
            height: 100%;
        }

        .kpi .label {
            color: #6b7280;
            font-size: 13px;
        }

        .kpi .value {
            font-size: 30px;
            font-weight: 900;
            margin-top: 6px;
        }

        .quick {
            background: #f8fafc;
            border: 1px dashed #e5e7eb;
            border-radius: 18px;
            padding: 18px;
        }
    </style>
</head>

<body>
    <div class="wrap">

        <!-- Top bar -->
        <div class="navx d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div class="brand">
                <div class="mark"></div>
                <div>
                    <div class="fw-bold">Digital Dairy</div>
                    <div class="muted small">Customer Panel</div>
                </div>
            </div>

            <a href="{% url 'customer_logout' %}" class="btn btn-outline-danger btn-pill">
                Logout
            </a>
        </div>

        <!-- Dashboard card -->
        <div class="cardx">

            <div class="topbar">
                <h3>Welcome, {{ customer.name }} 👋</h3>
                <div class="opacity-75">Manage your orders easily</div>
            </div>

            <div class="p-4 p-md-4">

                <!-- KPI row -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="kpi">
                            <div class="label">Total Orders</div>
                            <div class="value">{{ total_orders }}</div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="kpi">
                            <div class="label">Pending Orders</div>
                            <div class="value">{{ pending }}</div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="quick mt-4">
                    <div class="fw-bold mb-2">Quick Actions</div>
                    <div class="muted small mb-3">
                        Place new dairy orders or track your existing ones.
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <a href="{% url 'customer_place_order' %}" class="btn btn-success btn-pill btn-lg">
                            Place Order
                        </a>

                        <a href="{% url 'customer_my_orders' %}" class="btn btn-primary btn-pill btn-lg">
                            My Orders
                        </a>
                    </div>
                </div>

                <div class="text-center muted small mt-4">
                    © 2026 Digital Dairy • Customer Dashboard
                </div>

            </div>
        </div>

    </div>
</body>

</html>
