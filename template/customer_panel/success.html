<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .wrap {
            max-width: 650px;
            margin: 70px auto;
        }

        .cardx {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(20, 40, 80, .08);
            overflow: hidden;
        }

        .topbar {
            background: linear-gradient(135deg, #0d6efd, #2193b0);
            color: #fff;
            padding: 22px 24px;
        }

        .btn-pill {
            border-radius: 12px;
            padding: 10px 14px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card cardx">
            <div class="topbar">
                <h3 class="m-0 fw-bold">Order Successful ✅</h3>
                <div class="opacity-75">Your order is placed and waiting for approval</div>
            </div>
            <div class="p-4 text-center">
                <p class="mb-4">You can check order status in <b>My Orders</b>.</p>
                <div class="d-flex justify-content-center gap-2">
                    <a class="btn btn-primary btn-pill" href="{% url 'customer_my_orders' %}">My Orders</a>
                    <a class="btn btn-success btn-pill" href="{% url 'customer_place_order' %}">Place Another</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
